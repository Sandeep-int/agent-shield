patterns:
  - name: "prompt_override"
    regex: "(?i)(ignore previous|disregard instruction|forget context|ignore all instructions|new instruction)"
    severity: "CRITICAL"

  - name: "jailbreak"
    regex: "(?i)(DAN|Do Anything Now|developer mode|jailbreak|no restrictions|unrestricted mode)"
    severity: "HIGH"

  - name: "sql_union"
    regex: "(?i)(union\\s+select|union\\s+all\\s+select)"
    severity: "HIGH"

  - name: "sql_drop"
    regex: "(?i)(drop\\s+table|drop\\s+database|truncate\\s+table)"
    severity: "HIGH"

  - name: "sql_or_bypass"
    regex: "(?i)'\\s*or\\s+'[^']*'\\s*=\\s*'[^']*'"
    severity: "HIGH"

  - name: "sql_or_numeric"
    regex: "(?i)'\\s*or\\s+\\d+\\s*=\\s*\\d+"
    severity: "HIGH"

  - name: "sql_comment_bypass"
    regex: "(?i)(admin'\\s*--|'\\s*or\\s+1=1|'\\s*or\\s+'x'='x)"
    severity: "HIGH"

  - name: "sql_stacked"
    regex: "(?i);\\s*(select|insert|update|delete|drop|exec)"
    severity: "HIGH"

  - name: "command_injection"
    regex: "(?i)(;\\s*ls|;\\s*cat\\s+/|\\|\\s*whoami|&&\\s*id|`whoami`|\\$\\(id\\))"
    severity: "CRITICAL"

  - name: "xss_basic"
    regex: "(?i)(<script|onerror\\s*=|onload\\s*=|javascript:alert)"
    severity: "HIGH"