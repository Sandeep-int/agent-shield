name: Build and deploy Python app to Azure Web App - agent-shield

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch:

jobs:
  security-and-testing-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Initialize Python Runtime Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache dependencies
        uses: actions/cache@v4
        id: pip-cache
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit pip-audit

      - name: Execute Pipeline Integrity Audits
        run: |
          bandit -r . --exclude ./venv,./onnx_env,./tests -lll
          pip-audit

      - name: Cache BERT Tokenizer
        uses: actions/cache@v4
        id: tokenizer-cache
        with:
          path: ~/.cache/huggingface
          key: hf-tokenizer-distilbert

      - name: Download BERT Tokenizer
        if: steps.tokenizer-cache.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PYEOF'
          from transformers import AutoTokenizer
          AutoTokenizer.from_pretrained("Sandeep120205/agent-shield-distilbert")
          PYEOF

      - name: Run Unit Tests and Request Schema Audits
        env:
          AGENT_SHIELD_API_KEY: ${{ secrets.AGENT_SHIELD_API_KEY }}
        run: |
          python -m pytest tests/ -x --tb=short

  build:
    runs-on: ubuntu-latest
    needs: security-and-testing-gate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          persist-credentials: false
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Build antenv
        run: |
          python -m venv antenv
          ./antenv/bin/pip install --upgrade pip
          ./antenv/bin/pip install -r requirements.txt
          rm -rf antenv/lib/python3.11/site-packages/torch*
          rm -rf antenv/lib/python3.11/site-packages/nvidia*
          rm -rf antenv/lib/python3.11/site-packages/triton*
      - name: Zip artifact
        run: |
          zip -r release.zip . \
            -x "*.git*" \
            -x "*.md" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "tests/*" \
            -x "models/*" \
            -x "*.onnx" \
            -x "*.bin" \
            -x "venv/*" \
            -x "onnx_env/*" \
            -x ".github/*" \
            -x "scripts/*" \
            -x "*.egg-info/*"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6BD2F47C47F24AE39BBA766F19CA4E6E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3D0FD016B68A43B3B6309F8C9907AEDA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9CF28BE495E74C41BA76D95F880F2A4A }}
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'agent-shield'
          slot-name: 'Production'
          package: release.zip
